version: 1
disable_existing_loggers: false
incremental: false

formatters:
  readable:
    format: "%(asctime)s.%(msecs)03d %(levelname)1.1s %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: readable
    stream: ext://sys.stdout

root:
  level: INFO
  handlers:
    - console

loggers:
  watchfiles:
    level: WARNING
